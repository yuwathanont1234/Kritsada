name: Nightly Watch Prices Sync

on:
  schedule:
    - cron: '0 17 * * *' # รันอัตโนมัติเวลาเที่ยงคืนตรงของประเทศไทยทุกวัน (17:00 UTC)
  workflow_dispatch: # อนุญาตให้กดรันดึงราคาด้วยตัวเองแมนนวลผ่านหน้าเว็บ GitHub

jobs:
  sync-prices:
    name: Sync Watch Prices to Supabase
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Chrono24 Price Sync
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run sync:all
